blueprint:
  name: VMC Helty Flow - Promemoria Manutenzione Filtro
  description: >
    Sistema completo di notifiche per manutenzione filtro VMC.

    **Funzionalità**:
    - Avviso preventivo quando filtro raggiunge 90% vita utile
    - Allerta critica quando filtro supera 95% vita utile
    - Promemoria giornaliero se filtro non sostituito
    - Notifiche multiple: persistente UI, mobile, email (opzionali)
    - Traccia data ultimo reset per statistiche

    **Soglie standard** (basate su 3600 ore = ~6 mesi):
    - 3240 ore (90%) = Avviso preventivo
    - 3420 ore (95%) = Allerta critica
    - 3600 ore (100%) = Promemoria urgente giornaliero

  domain: automation

  source_url: https://github.com/darius1907/ha_vmc_helty_flow/blob/main/blueprints/automation/vmc_schedule_plan/vmc_filter_reminder.yaml

  input:
    vmc_entity:
      name: Entità VMC
      description: Entità fan o sensor della VMC (per identificazione)
      selector:
        entity:
          integration: vmc_helty_flow

    filter_hours_sensor:
      name: Sensore Ore Filtro
      description: Sensore che traccia le ore di utilizzo del filtro
      selector:
        entity:
          domain: sensor

    warning_threshold:
      name: Soglia Avviso (ore)
      description: Ore di utilizzo per avviso preventivo (suggerito 3240 = 90%)
      default: 3240
      selector:
        number:
          min: 2000
          max: 3600
          step: 100
          unit_of_measurement: "ore"
          mode: box

    critical_threshold:
      name: Soglia Critica (ore)
      description: Ore di utilizzo per allerta critica (suggerito 3420 = 95%)
      default: 3420
      selector:
        number:
          min: 2500
          max: 3900
          step: 100
          unit_of_measurement: "ore"
          mode: box

    max_threshold:
      name: Soglia Massima (ore)
      description: Ore massime raccomandate (promemoria giornaliero) (suggerito 3600 = 100%)
      default: 3600
      selector:
        number:
          min: 3000
          max: 5000
          step: 100
          unit_of_measurement: "ore"
          mode: box

    # Notifiche persistenti (sempre attive)
    create_persistent_notification:
      name: Crea Notifica Persistente UI
      description: Mostra notifica persistente nell'interfaccia Home Assistant
      default: true
      selector:
        boolean:

    # Notifiche mobile (opzionali)
    notify_mobile:
      name: Notifica Mobile (opzionale)
      description: Servizio notify per app mobile (es. notify.mobile_app_iphone)
      default: ""
      selector:
        text:

    # Notifiche email (opzionali)
    notify_email:
      name: Notifica Email (opzionale)
      description: Servizio notify per email (es. notify.email_john)
      default: ""
      selector:
        text:

    # Reminder giornaliero
    daily_reminder_time:
      name: Ora Promemoria Giornaliero
      description: Ora in cui ricevere promemoria giornaliero se filtro oltre soglia massima
      default: "09:00:00"
      selector:
        time:

    # Action buttons
    include_action_buttons:
      name: Includi Pulsanti Azione
      description: Aggiungi pulsanti "Reset Filtro" e "Promemoria Successivo" nelle notifiche mobile
      default: true
      selector:
        boolean:

variables:
  vmc_name: >
    {{ state_attr(vmc_entity, 'friendly_name') | default('VMC Helty', true) }}
  filter_hours: >
    {{ states(filter_hours_sensor) | float(0) }}
  filter_percentage: >
    {{ ((filter_hours / max_threshold) * 100) | round(1) }}
  notify_mobile_service: !input notify_mobile
  notify_email_service: !input notify_email
  persistent_enabled: !input create_persistent_notification
  action_buttons: !input include_action_buttons

# Multipli trigger per diversi livelli di avviso
trigger:
  # Trigger 1: Avviso preventivo (90%)
  - platform: numeric_state
    entity_id: !input filter_hours_sensor
    above: !input warning_threshold
    id: warning

  # Trigger 2: Allerta critica (95%)
  - platform: numeric_state
    entity_id: !input filter_hours_sensor
    above: !input critical_threshold
    id: critical

  # Trigger 3: Promemoria giornaliero se oltre soglia massima
  - platform: time
    at: !input daily_reminder_time
    id: daily_reminder

condition:
  # Evita notifiche ridondanti - triggera solo al cambio di soglia
  - condition: template
    value_template: >
      {% set hours = states(filter_hours_sensor) | float(0) %}
      {% if trigger.id == 'daily_reminder' %}
        {{ hours >= max_threshold }}
      {% elif trigger.id == 'critical' %}
        {{ hours >= critical_threshold and hours < (critical_threshold + 50) }}
      {% elif trigger.id == 'warning' %}
        {{ hours >= warning_threshold and hours < (warning_threshold + 50) }}
      {% else %}
        true
      {% endif %}

action:
  - variables:
      notification_data:
        warning:
          title: "⚠️ VMC - Filtro al 90%"
          message: >
            Il filtro {{ vmc_name }} ha raggiunto {{ filter_hours }} ore ({{ filter_percentage }}%).

            📅 Pianificare sostituzione nelle prossime 2-3 settimane.
            🛒 Verificare disponibilità filtro di ricambio.
          severity: warning
          icon: mdi:air-filter
        critical:
          title: "🚨 VMC - Filtro al 95% - URGENTE"
          message: >
            Il filtro {{ vmc_name }} è a {{ filter_hours }} ore ({{ filter_percentage }}%).

            ⚠️ SOSTITUIRE ENTRO 1 SETTIMANA
            ⚡ Efficienza VMC ridotta
            💸 Aumento consumi energetici
          severity: critical
          icon: mdi:air-filter-alert
        daily_reminder:
          title: "🔔 VMC - Promemoria Filtro"
          message: >
            Il filtro {{ vmc_name }} è oltre la vita utile ({{ filter_hours }} ore / {{ max_threshold }} ore).

            🛑 SOSTITUIRE FILTRO IL PRIMA POSSIBILE
            📉 Performance VMC compromessa

            Dopo sostituzione: premere Reset Filtro nella VMC.
          severity: error
          icon: mdi:filter-remove

  - variables:
      trigger_type: "{{ trigger.id | default('warning', true) }}"
      notif: "{{ notification_data[trigger_type] }}"

  # 1. Notifica Persistente UI (se abilitata)
  - if:
      - condition: template
        value_template: "{{ persistent_enabled }}"
    then:
      - service: persistent_notification.create
        data:
          title: "{{ notif.title }}"
          message: "{{ notif.message }}"
          notification_id: "vmc_filter_{{ vmc_entity | replace('.', '_') }}"

  # 2. Notifica Mobile (se configurata)
  - if:
      - condition: template
        value_template: "{{ notify_mobile_service != '' }}"
    then:
      - service: "{{ notify_mobile_service }}"
        data:
          title: "{{ notif.title }}"
          message: "{{ notif.message }}"
          data:
            # Notification channel per Android
            channel: "VMC Maintenance"
            importance: high
            # Badge e icona
            notification_icon: "{{ notif.icon }}"
            # Action buttons (se abilitati)
            actions: >
              {% if action_buttons %}
              [
                {
                  "action": "RESET_VMC_FILTER",
                  "title": "✅ Reset Filtro",
                  "icon": "sfsymbols:arrow.counterclockwise"
                },
                {
                  "action": "SNOOZE_VMC_REMINDER",
                  "title": "⏰ Ricorda tra 1 giorno",
                  "icon": "sfsymbols:clock"
                }
              ]
              {% else %}
              []
              {% endif %}
            # iOS specific
            push:
              interruption-level: time-sensitive

  # 3. Notifica Email (se configurata)
  - if:
      - condition: template
        value_template: "{{ notify_email_service != '' }}"
    then:
      - service: "{{ notify_email_service }}"
        data:
          title: "{{ notif.title }}"
          message: >
            {{ notif.message }}

            ---
            DETTAGLI VMC
            ---
            Entità: {{ vmc_entity }}
            Ore Filtro: {{ filter_hours }} / {{ max_threshold }} ore
            Percentuale: {{ filter_percentage }}%
            Data/Ora: {{ now().strftime('%d/%m/%Y %H:%M') }}

            ---
            AZIONI RACCOMANDATE
            ---
            1. Ordinare filtro compatibile
            2. Programmare sostituzione
            3. Eseguire reset contatore dopo sostituzione

            Per reset: Home Assistant > VMC Helty Flow > Reset Filter Button

  # 4. Logbook entry
  - service: logbook.log
    data:
      name: "VMC Filter Maintenance"
      message: >
        {{ notif.title }} - {{ filter_hours }} ore ({{ filter_percentage }}%)
      entity_id: !input filter_hours_sensor

  # 5. Crea evento per automazioni custom
  - event: vmc_filter_reminder
    event_data:
      vmc_entity: !input vmc_entity
      filter_hours: "{{ filter_hours }}"
      filter_percentage: "{{ filter_percentage }}"
      threshold_type: "{{ trigger_type }}"
      timestamp: "{{ now().isoformat() }}"

